<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puppy Pal 🐕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;overflow-x:hidden;-webkit-user-select:none;user-select:none}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}

/* TITLE */
#title-screen{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);text-align:center}
#title-screen h1{font-size:3.2em;margin-bottom:8px;color:#c9a84c}
.title-pup{font-size:6em;margin-bottom:10px;animation:titleBounce 1s ease infinite}
@keyframes titleBounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-20px) rotate(3deg)}}
.tagline{color:#aaa;font-size:1.1em;margin-bottom:40px}
.btn{padding:14px 36px;border:none;border-radius:14px;font-size:1.1em;font-weight:bold;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{transform:scale(1.05)}.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#daa520);color:#1a1a2e;box-shadow:0 4px 15px #c9a84c44}
.btn-secondary{background:transparent;border:2px solid #c9a84c;color:#c9a84c;margin-top:12px}

/* PICK */
#pick-screen{background:linear-gradient(135deg,#1a1a2e,#16213e)}
#pick-screen h2{font-size:2em;margin-bottom:30px;color:#c9a84c}
.breed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:560px;width:100%;padding:0 10px}
@media(max-width:520px){.breed-grid{grid-template-columns:repeat(2,1fr)}}
.breed-card{background:#16213e;border:3px solid #333;border-radius:18px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .25s}
.breed-card:hover{border-color:#c9a84c;transform:translateY(-5px);box-shadow:0 10px 30px #0006}
.breed-card.selected{border-color:#c9a84c;background:#1a2a4e;box-shadow:0 0 20px #c9a84c33}
.breed-card svg{display:block;margin:0 auto 8px}
.breed-name{font-weight:bold;font-size:.9em}.breed-desc{font-size:.72em;color:#888;margin-top:3px}
#pick-confirm{margin-top:30px;opacity:0;pointer-events:none;transition:all .3s}
#pick-confirm.show{opacity:1;pointer-events:auto}
#name-input{background:#0d1b2a;border:2px solid #444;border-radius:12px;padding:12px 16px;color:#e0e0e0;font-size:1em;font-family:inherit;width:260px;text-align:center;margin:20px 0}
#name-input:focus{outline:none;border-color:#c9a84c}

/* GAME */
#game-screen{background:#1a1a2e;justify-content:flex-start;padding-top:16px}
.game-header{width:100%;max-width:500px;display:flex;justify-content:space-between;align-items:center;padding:0 10px;margin-bottom:8px}
.dog-name-display{font-size:1.3em;font-weight:bold;color:#c9a84c}
.clock{font-size:.9em;color:#aaa;background:#16213e;padding:6px 14px;border-radius:20px}

/* PLAY AREA */
#play-area{width:100%;max-width:500px;height:280px;border-radius:20px;position:relative;overflow:hidden;margin:8px 0;transition:background 1s}
.sky-day{background:linear-gradient(180deg,#87CEEB 0%,#a8d8ea 48%,#4a8f3f 48%,#3d7a34 100%)}
.sky-night{background:linear-gradient(180deg,#0d1230 0%,#1a1a3e 48%,#1a2a1a 48%,#1d2d1d 100%)}
.env-sun{position:absolute;top:12px;left:16px;font-size:2em;z-index:5;transition:all 1s}
.env-cloud{position:absolute;font-size:1.3em;opacity:.5;z-index:3;pointer-events:none}
.env-cloud.c1{top:18px;animation:drift 16s linear infinite}
.env-cloud.c2{top:40px;animation:drift 22s linear infinite reverse;font-size:1em}
@keyframes drift{0%{left:-80px}100%{left:110%}}

/* DOG CANVAS */
#dog-canvas{position:absolute;bottom:0;left:0;width:100%;height:100%;z-index:10}

/* PARTICLES */
.particle{position:absolute;pointer-events:none;z-index:20;animation:particleUp 1.2s ease-out forwards;font-size:1.4em}
@keyframes particleUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}
.particle.big{font-size:2em;animation:particlePop 0.8s ease-out forwards}
@keyframes particlePop{0%{opacity:1;transform:scale(0)}50%{transform:scale(1.3)}100%{opacity:0;transform:scale(0.6) translateY(-40px)}}
.particle.bubble{animation:bubbleFloat 1.5s ease-out forwards}
@keyframes bubbleFloat{0%{opacity:.8;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) translateX(20px) scale(.3)}}
.particle.zzz{animation:zzzUp 2s ease-out forwards;color:#c9a84c;font-weight:bold}
@keyframes zzzUp{0%{opacity:1;transform:translateY(0) scale(.8)}100%{opacity:0;transform:translateY(-50px) scale(1.2)}}
.particle.food{animation:foodBounce .8s ease-out forwards}
@keyframes foodBounce{0%{opacity:1;transform:translateY(0)}40%{transform:translateY(-20px)}100%{opacity:0;transform:translateY(10px)}}

/* MOOD */
.mood-float{position:absolute;top:10px;right:14px;font-size:2em;z-index:15;animation:moodPulse 2s ease infinite}
@keyframes moodPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* STATS */
.stats{width:100%;max-width:500px;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 10px;margin:8px 0}
.stat{background:#16213e;border-radius:10px;padding:8px 10px}
.stat-label{font-size:.72em;color:#aaa;margin-bottom:3px}
.stat-bar-bg{width:100%;height:8px;background:#0d1b2a;border-radius:4px;overflow:hidden}
.stat-bar{height:100%;border-radius:4px;transition:width .6s ease,background .4s}
.stat-bar.high{background:linear-gradient(90deg,#4caf50,#66bb6a)}.stat-bar.mid{background:linear-gradient(90deg,#ff9800,#ffa726)}.stat-bar.low{background:linear-gradient(90deg,#e74c3c,#ef5350);animation:lowPulse 1s ease infinite}
@keyframes lowPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ACTIONS */
.actions{width:100%;max-width:500px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 10px;margin:8px 0}
.action-btn{background:#16213e;border:2px solid #333;border-radius:14px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:inherit;color:#e0e0e0;font-size:.82em}
.action-btn:hover:not(:disabled){border-color:#c9a84c;background:#1a2a4e;transform:scale(1.04)}
.action-btn:active:not(:disabled){transform:scale(.96)}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.act-icon{font-size:1.6em;margin-bottom:2px}.act-name{font-weight:bold;font-size:.9em}
.cooldown-overlay{font-size:.72em;color:#ff9800;margin-top:1px}

/* LOG */
.log{width:100%;max-width:500px;background:#16213e;border-radius:12px;padding:10px;margin:8px 0 16px;max-height:80px;overflow-y:auto}
.log-entry{font-size:.78em;color:#aaa;padding:2px 0;border-bottom:1px solid #222}.log-entry:last-child{border-bottom:none}
.log-time{color:#c9a84c;margin-right:5px}

/* GAME OVER */
#gameover-screen{background:linear-gradient(135deg,#2a1a1a,#1a1a2e);text-align:center}
#gameover-screen h2{font-size:2.2em;color:#e74c3c;margin:20px 0}
.go-emoji{font-size:5em;margin-bottom:10px}
.go-msg{color:#aaa;font-size:1.05em;max-width:400px;line-height:1.6;margin-bottom:30px}
</style>
</head>
<body>

<div class="screen active" id="title-screen">
  <div class="title-pup">🐶</div>
  <h1>Puppy Pal</h1>
  <div class="tagline">Your virtual pup needs love!</div>
  <button class="btn btn-primary" onclick="showScreen('pick-screen')">New Puppy</button>
  <button class="btn btn-secondary" id="continue-btn" style="display:none" onclick="loadGame()">Continue</button>
</div>

<div class="screen" id="pick-screen">
  <h2>Choose Your Pup</h2>
  <div class="breed-grid" id="breed-grid"></div>
  <input type="text" id="name-input" placeholder="Name your pup..." maxlength="16">
  <div id="pick-confirm"><button class="btn btn-primary" onclick="startGame()">Let's Go! 🐾</button></div>
</div>

<div class="screen" id="game-screen">
  <div class="game-header">
    <div class="dog-name-display" id="dog-name-display"></div>
    <div class="clock" id="clock">Day 1 · 6:00 AM</div>
  </div>
  <div id="play-area" class="sky-day">
    <div class="env-sun" id="env-sun">☀️</div>
    <div class="env-cloud c1">☁️</div>
    <div class="env-cloud c2">⛅</div>
    <div class="mood-float" id="mood-float">😊</div>
    <canvas id="dog-canvas"></canvas>
  </div>
  <div class="stats" id="stats-area"></div>
  <div class="actions" id="actions-area"></div>
  <div class="log" id="log"></div>
</div>

<div class="screen" id="gameover-screen">
  <div class="go-emoji">😢🐾</div>
  <h2>Your Pup Ran Away...</h2>
  <div class="go-msg" id="go-msg"></div>
  <button class="btn btn-primary" onclick="resetGame()">Try Again</button>
</div>

<script>
// ═══════════════════════════════════════
//  BREED DEFINITIONS
// ═══════════════════════════════════════
const BREEDS=[
  {id:'golden',  name:'Golden Retriever',desc:'Loyal & loving',   body:'#D4A843',dark:'#B08A2E',light:'#E8C86A',belly:'#EBD99A',nose:'#333',earDrop:true,tailCurl:0,longBody:false},
  {id:'lab',     name:'Labrador',        desc:'Friendly & active',body:'#C8A050',dark:'#A07830',light:'#DABA70',belly:'#E0CFA0',nose:'#222',earDrop:true,tailCurl:.3,longBody:false},
  {id:'poodle',  name:'Poodle',          desc:'Smart & elegant',  body:'#E0D0E0',dark:'#C0A8C0',light:'#F0E8F0',belly:'#F4EEF4',nose:'#444',earDrop:true,tailCurl:.6,longBody:false,poofy:true},
  {id:'bulldog', name:'Bulldog',         desc:'Tough but sweet',  body:'#D4C0A0',dark:'#B0A080',light:'#E8DAC0',belly:'#F0E8D8',nose:'#333',earDrop:false,tailCurl:0,longBody:false,stocky:true},
  {id:'husky',   name:'Husky',           desc:'Wild & energetic', body:'#8899AA',dark:'#667788',light:'#AABBcc',belly:'#E8E8F0',nose:'#333',earDrop:false,tailCurl:.8,longBody:false,mask:true},
  {id:'dachshund',name:'Dachshund',      desc:'Long & legendary', body:'#A06830',dark:'#804C18',light:'#C08848',belly:'#D0A878',nose:'#222',earDrop:true,tailCurl:0,longBody:true},
];

const STATS=[
  {id:'hunger',icon:'🍖',label:'Hunger',decay:.8},
  {id:'happiness',icon:'❤️',label:'Happiness',decay:.6},
  {id:'energy',icon:'⚡',label:'Energy',decay:.5},
  {id:'bladder',icon:'💧',label:'Bladder',decay:1},
  {id:'clean',icon:'✨',label:'Clean',decay:.3},
  {id:'health',icon:'💚',label:'Health',decay:.15},
];

const ACTIONS=[
  {id:'feed',icon:'🍖',name:'Feed',cd:8,fx:{hunger:30,health:3},need:{},msg:'munches happily!',anim:'eat',particles:['🍖','✨','😋']},
  {id:'pet',icon:'🤗',name:'Pet',cd:5,fx:{happiness:20},need:{},msg:'wags tail excitedly!',anim:'pet',particles:['❤️','💕','💖','🥰']},
  {id:'walk',icon:'🚶',name:'Walk',cd:15,fx:{happiness:15,energy:-15,bladder:-25,health:5},need:{energy:15},msg:'enjoys the walk!',anim:'walk',particles:['🐾','🌿','🦋']},
  {id:'bathroom',icon:'🚽',name:'Bathroom',cd:10,fx:{bladder:-40,clean:-5},need:{bladder:20},msg:'does their business!',anim:'idle',particles:['💨']},
  {id:'bath',icon:'🛁',name:'Bath',cd:20,fx:{clean:40,happiness:-5},need:{},msg:'is squeaky clean!',anim:'bath',particles:['🫧','🫧','🫧','✨','💧']},
  {id:'play',icon:'🎾',name:'Play',cd:12,fx:{happiness:25,energy:-20,hunger:-5},need:{energy:20},msg:'plays fetch!',anim:'play',particles:['🎾','⭐','🌟','🎉']},
  {id:'sleep',icon:'😴',name:'Sleep',cd:25,fx:{energy:40,health:5},need:{},msg:'takes a cozy nap...',anim:'sleep',particles:['💤','💤','⭐']},
  {id:'treat',icon:'🦴',name:'Treat',cd:10,fx:{happiness:15,hunger:10},need:{},msg:'loves the treat!',anim:'eat',particles:['🦴','❤️','😍']},
  {id:'vet',icon:'🏥',name:'Vet',cd:30,fx:{health:30,happiness:-10},need:{},msg:'got a checkup!',anim:'idle',particles:['💊','🩹','💚']},
];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let G=null,cooldowns={},canvas,ctx;
let dogX=0,dogY=0,dogVX=0,dogTargetX=0,dogFacing=1; // 1=right,-1=left
let dogAnim='idle',dogAnimT=0,dogBlink=0,blinkT=0,breathT=0,tailT=0,walkT=0,happyT=0;
let sleepZT=0,tickI=null;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ═══════════════════════════════════════
//  SVG PREVIEWS FOR BREED PICKER
// ═══════════════════════════════════════
function breedSVG(b){
  const w=80,h=70;
  const bx=b.longBody?18:25,by=b.stocky?32:28,bw=b.longBody?50:34,bh=b.stocky?22:18;
  const hx=b.longBody?12:18,hy=12,hr=b.stocky?16:14;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <!-- body -->
    <ellipse cx="${bx+bw/2}" cy="${by+bh/2}" rx="${bw/2}" ry="${bh/2}" fill="${b.body}" stroke="${b.dark}" stroke-width="1.5"/>
    <ellipse cx="${bx+bw/2}" cy="${by+bh/2+3}" rx="${bw/2-4}" ry="${bh/2-3}" fill="${b.belly}" opacity=".5"/>
    <!-- legs -->
    <rect x="${bx+4}" y="${by+bh-4}" width="7" height="14" rx="3" fill="${b.dark}"/>
    <rect x="${bx+bw-11}" y="${by+bh-4}" width="7" height="14" rx="3" fill="${b.dark}"/>
    <!-- tail -->
    <path d="M${bx+bw-2},${by+4} Q${bx+bw+10},${by-8+b.tailCurl*-10} ${bx+bw+6},${by-2}" stroke="${b.body}" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="${hx}" cy="${hy+hr}" r="${hr}" fill="${b.body}" stroke="${b.dark}" stroke-width="1.5"/>
    ${b.mask?`<ellipse cx="${hx}" cy="${hy+hr+4}" rx="9" ry="7" fill="white" opacity=".7"/>`:''}
    ${b.poofy?`<circle cx="${hx}" cy="${hy+hr-8}" r="8" fill="${b.light}" opacity=".6"/>`:''}
    <!-- ears -->
    ${b.earDrop?
      `<ellipse cx="${hx-10}" cy="${hy+hr-2}" rx="5" ry="10" fill="${b.dark}" transform="rotate(-15 ${hx-10} ${hy+hr-2})"/>
       <ellipse cx="${hx+10}" cy="${hy+hr-2}" rx="5" ry="10" fill="${b.dark}" transform="rotate(15 ${hx+10} ${hy+hr-2})"/>`
      :`<polygon points="${hx-9},${hy+hr-8} ${hx-13},${hy+hr-18} ${hx-3},${hy+hr-10}" fill="${b.dark}"/>
        <polygon points="${hx+9},${hy+hr-8} ${hx+13},${hy+hr-18} ${hx+3},${hy+hr-10}" fill="${b.dark}"/>`}
    <!-- eyes -->
    <circle cx="${hx-5}" cy="${hy+hr-2}" r="3.5" fill="white"/>
    <circle cx="${hx+5}" cy="${hy+hr-2}" r="3.5" fill="white"/>
    <circle cx="${hx-4}" cy="${hy+hr-2}" r="2" fill="#1a1a2e"/>
    <circle cx="${hx+6}" cy="${hy+hr-2}" r="2" fill="#1a1a2e"/>
    <circle cx="${hx-3.5}" cy="${hy+hr-3}" r=".8" fill="white"/>
    <circle cx="${hx+6.5}" cy="${hy+hr-3}" r=".8" fill="white"/>
    <!-- nose -->
    <ellipse cx="${hx}" cy="${hy+hr+5}" rx="3" ry="2" fill="${b.nose}"/>
    <!-- mouth -->
    <path d="M${hx-3},${hy+hr+7} Q${hx},${hy+hr+10} ${hx+3},${hy+hr+7}" stroke="${b.dark}" stroke-width=".8" fill="none"/>
  </svg>`;
}

// ═══════════════════════════════════════
//  CANVAS DOG DRAWING
// ═══════════════════════════════════════
function drawDog(){
  if(!G||!ctx)return;
  const b=BREEDS.find(x=>x.id===G.breed);
  const cw=canvas.width/2,ch=canvas.height/2; // retina
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();

  // Position
  const drawX=dogX*2, drawY=dogY*2; // retina scale
  ctx.translate(drawX,drawY);
  ctx.scale(dogFacing,1);

  // Breath offset
  const breathOff=Math.sin(breathT*2)*2;
  // Walk bob
  const walkBob=dogAnim==='walk'?Math.sin(walkT*12)*3:0;
  // Happy bounce
  const happyBounce=dogAnim==='play'?Math.abs(Math.sin(happyT*6))*12:0;
  const petSquish=dogAnim==='pet'?Math.sin(happyT*8)*.06:0;

  ctx.translate(0, walkBob - happyBounce + breathOff);
  ctx.scale(1+petSquish, 1-petSquish);

  const sc=2.2; // scale factor for cuteness (bigger = cuter)
  ctx.scale(sc,sc);

  // Sleep tilt
  if(dogAnim==='sleep'){ctx.rotate(Math.sin(breathT)*.05);}

  const long=b.longBody, stocky=b.stocky;
  const bw=long?50:34, bh=stocky?24:20;

  // ── SHADOW ──
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.beginPath();ctx.ellipse(0,bh/2+12,bw/2+4,5,0,0,Math.PI*2);ctx.fill();

  // ── TAIL ──
  tailT+=.05;
  const tailWag=(G.stats.happiness>40||dogAnim==='pet'||dogAnim==='play')?Math.sin(tailT*10)*20:Math.sin(tailT*2)*5;
  ctx.save();
  ctx.translate(bw/2-4, -bh/2+2);
  ctx.rotate((tailWag-30)*Math.PI/180);
  ctx.strokeStyle=b.body;ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.quadraticCurveTo(8+b.tailCurl*6, -14-b.tailCurl*6, 4+b.tailCurl*8, -18);
  ctx.stroke();
  ctx.restore();

  // ── BACK LEGS ──
  const legKick=dogAnim==='walk'?Math.sin(walkT*12)*12:0;
  ctx.fillStyle=b.dark;
  // back-left
  ctx.save();ctx.translate(-bw/2+8,bh/2-2);ctx.rotate((-legKick)*Math.PI/180);
  roundRect(ctx,-4,0,8,long?12:16,3);ctx.fill();ctx.restore();
  // back-right
  ctx.save();ctx.translate(bw/2-8,bh/2-2);ctx.rotate((legKick)*Math.PI/180);
  roundRect(ctx,-4,0,8,long?12:16,3);ctx.fill();ctx.restore();

  // ── BODY ──
  ctx.fillStyle=b.body;
  ctx.beginPath();ctx.ellipse(0,0,bw/2,bh/2,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=b.dark;ctx.lineWidth=1.5;ctx.stroke();
  // belly
  ctx.fillStyle=b.belly;ctx.globalAlpha=.45;
  ctx.beginPath();ctx.ellipse(0,4,bw/2-6,bh/2-5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // ── FRONT LEGS ──
  ctx.fillStyle=b.dark;
  ctx.save();ctx.translate(-bw/2+8,bh/2-2);ctx.rotate((legKick)*Math.PI/180);
  roundRect(ctx,-4,0,8,long?12:16,3);ctx.fill();
  // paw
  ctx.fillStyle=b.belly;ctx.beginPath();ctx.ellipse(0,long?12:16,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.fillStyle=b.dark;
  ctx.save();ctx.translate(bw/2-8,bh/2-2);ctx.rotate((-legKick)*Math.PI/180);
  roundRect(ctx,-4,0,8,long?12:16,3);ctx.fill();
  ctx.fillStyle=b.belly;ctx.beginPath();ctx.ellipse(0,long?12:16,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── HEAD ──
  const headR=stocky?18:16;
  const headX=long?-bw/2-4:-bw/2+6;
  const headY=-bh/2-headR+8;
  ctx.save();ctx.translate(headX,headY);

  // Ears behind head
  if(b.earDrop){
    ctx.fillStyle=b.dark;
    // floppy ears
    ctx.save();ctx.translate(-headR+2,0);ctx.rotate(-.2);
    ctx.beginPath();ctx.ellipse(0,0,6,12,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.translate(headR-2,0);ctx.rotate(.2);
    ctx.beginPath();ctx.ellipse(0,0,6,12,0,0,Math.PI*2);ctx.fill();ctx.restore();
  } else {
    // pointy ears
    ctx.fillStyle=b.dark;
    ctx.beginPath();ctx.moveTo(-headR+3,-2);ctx.lineTo(-headR,-headR+2);ctx.lineTo(-headR+10,-6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(headR-3,-2);ctx.lineTo(headR,-headR+2);ctx.lineTo(headR-10,-6);ctx.closePath();ctx.fill();
    // inner ear
    ctx.fillStyle=b.belly;
    ctx.beginPath();ctx.moveTo(-headR+5,0);ctx.lineTo(-headR+2,-headR+5);ctx.lineTo(-headR+9,-5);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(headR-5,0);ctx.lineTo(headR-2,-headR+5);ctx.lineTo(headR-9,-5);ctx.closePath();ctx.fill();
  }

  // Head circle
  ctx.fillStyle=b.body;
  ctx.beginPath();ctx.arc(0,0,headR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=b.dark;ctx.lineWidth=1.2;ctx.stroke();

  // Husky mask
  if(b.mask){
    ctx.fillStyle='white';ctx.globalAlpha=.6;
    ctx.beginPath();ctx.ellipse(0,5,10,8,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // Poodle poof
  if(b.poofy){
    ctx.fillStyle=b.light;ctx.globalAlpha=.5;
    ctx.beginPath();ctx.arc(0,-headR+4,10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── EYES ──
  const eyeY=-2, eyeSpread=7;
  if(dogAnim==='sleep'||dogBlink){
    // closed eyes (cute curves)
    ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(-eyeSpread,eyeY,3,0.1,Math.PI-0.1);ctx.stroke();
    ctx.beginPath();ctx.arc(eyeSpread,eyeY,3,0.1,Math.PI-0.1);ctx.stroke();
  } else {
    // Big cute eyes with highlight
    [-1,1].forEach(side=>{
      const ex=side*eyeSpread;
      // white
      ctx.fillStyle='white';
      ctx.beginPath();ctx.ellipse(ex,eyeY,4.5,5,0,0,Math.PI*2);ctx.fill();
      // iris
      ctx.fillStyle='#3a2a1a';
      ctx.beginPath();ctx.arc(ex+side*.8,eyeY+.5,2.8,0,Math.PI*2);ctx.fill();
      // pupil
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(ex+side*1,eyeY+.5,1.5,0,Math.PI*2);ctx.fill();
      // shine
      ctx.fillStyle='white';
      ctx.beginPath();ctx.arc(ex+side*-.5,eyeY-1.5,1.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+side*1.5,eyeY+1,0.5,0,Math.PI*2);ctx.fill();
    });
    // rosy cheeks
    ctx.fillStyle='#ff9999';ctx.globalAlpha=.2;
    ctx.beginPath();ctx.arc(-eyeSpread-3,eyeY+6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(eyeSpread+3,eyeY+6,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── NOSE ──
  ctx.fillStyle=b.nose;
  ctx.beginPath();ctx.ellipse(0,eyeY+8,3.5,2.5,0,0,Math.PI*2);ctx.fill();
  // highlight
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.beginPath();ctx.ellipse(-.8,eyeY+7.2,1.5,1,0,0,Math.PI*2);ctx.fill();

  // ── MOUTH ──
  ctx.strokeStyle=b.dark;ctx.lineWidth=1;ctx.lineCap='round';
  if(dogAnim==='eat'){
    // open mouth eating
    ctx.fillStyle='#e86b6b';
    ctx.beginPath();ctx.ellipse(0,eyeY+12,4,3,0,0,Math.PI*2);ctx.fill();
  } else if(G.stats.happiness>60||dogAnim==='pet'||dogAnim==='play'){
    // happy smile
    ctx.beginPath();ctx.arc(0,eyeY+9,4,.1,Math.PI-.1);ctx.stroke();
    // tongue out when very happy
    if(G.stats.happiness>75||dogAnim==='pet'){
      ctx.fillStyle='#e86b6b';
      ctx.beginPath();ctx.ellipse(2,eyeY+13,3,4+Math.sin(breathT*4),0,0,Math.PI*2);ctx.fill();
    }
  } else {
    // neutral
    ctx.beginPath();ctx.moveTo(-3,eyeY+10);ctx.quadraticCurveTo(0,eyeY+12,3,eyeY+10);ctx.stroke();
  }

  ctx.restore(); // head

  // ── DIRTY SPOTS ──
  if(G.stats.clean<30){
    ctx.fillStyle='#6B4F3A';ctx.globalAlpha=.5;
    [[-8,-4],[5,2],[12,-6],[-3,6]].forEach(([ox,oy])=>{
      ctx.beginPath();ctx.arc(ox,oy,2,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  ctx.restore(); // root transform
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// ═══════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════
let lastT=0;
function animLoop(ts){
  if(!G||!G.alive)return;
  const dt=Math.min((ts-lastT)/1000,.1);lastT=ts;

  breathT+=dt; tailT+=dt;

  // Blink
  blinkT-=dt;
  if(blinkT<=0&&!dogBlink){dogBlink=true;setTimeout(()=>{dogBlink=false;},120);blinkT=2.5+Math.random()*4;}

  // Movement
  if(dogAnim==='walk'||dogAnim==='play'){
    walkT+=dt;
    const dx=dogTargetX-dogX;
    const dist=Math.abs(dx);
    if(dist>5){
      const spd=dogAnim==='play'?120:55;
      dogX+=Math.sign(dx)*spd*dt;
      dogFacing=dx>0?1:-1;
    } else { pickTarget(); }
  } else if(dogAnim==='idle'){
    dogAnimT-=dt;
    if(dogAnimT<=0){
      // randomly decide to stroll
      if(Math.random()<.4){ dogAnim='walk'; pickTarget(); }
      else { dogAnimT=2+Math.random()*3; }
    }
    // slow drift
    const dx=dogTargetX-dogX;
    if(Math.abs(dx)>3) dogX+=Math.sign(dx)*15*dt;
  } else if(dogAnim==='sleep'){
    // stay still
  } else if(dogAnim==='eat'||dogAnim==='pet'||dogAnim==='bath'){
    happyT+=dt;
    dogAnimT-=dt;
    if(dogAnimT<=0){dogAnim='idle';dogAnimT=2;}
  }

  // Keep in bounds
  const area=document.getElementById('play-area');
  const maxX=area?area.clientWidth-40:420;
  dogX=Math.max(40,Math.min(maxX,dogX));

  drawDog();
  requestAnimationFrame(animLoop);
}

function pickTarget(){
  const area=document.getElementById('play-area');
  const w=area?area.clientWidth:460;
  dogTargetX=50+Math.random()*(w-100);
}

// ═══════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════
function spawnParticles(emojis, count){
  const area=document.getElementById('play-area');
  if(!area)return;
  for(let i=0;i<(count||emojis.length);i++){
    const p=document.createElement('div');
    const e=emojis[i%emojis.length];
    const isBubble=e==='🫧'||e==='💧';
    const isZzz=e==='💤';
    p.className='particle'+(isBubble?' bubble':isZzz?' zzz':i===0?' big':'');
    p.textContent=e;
    p.style.left=(dogX-20+Math.random()*60)+'px';
    p.style.top=(dogY-20+Math.random()*30)+'px';
    p.style.animationDelay=(i*0.15)+'s';
    area.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }
}

// ═══════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════
function initBreedGrid(){
  const grid=document.getElementById('breed-grid');grid.innerHTML='';
  BREEDS.forEach(b=>{
    const card=document.createElement('div');card.className='breed-card';
    card.innerHTML=breedSVG(b)+`<div class="breed-name">${b.name}</div><div class="breed-desc">${b.desc}</div>`;
    card.onclick=()=>{
      grid.querySelectorAll('.breed-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      G={breed:b.id};
      document.getElementById('pick-confirm').classList.add('show');
    };
    grid.appendChild(card);
  });
}

function startGame(){
  const n=document.getElementById('name-input').value.trim();
  if(!G||!G.breed)return;
  const breed=BREEDS.find(b=>b.id===G.breed);
  G={breed:G.breed,name:n||breed.name,stats:{hunger:80,happiness:80,energy:80,bladder:70,clean:90,health:100},time:360,day:1,log:[],alive:true,created:Date.now()};
  cooldowns={};saveGame();enterGame();
}

function enterGame(){
  showScreen('game-screen');
  document.getElementById('dog-name-display').textContent=G.name;

  // Setup canvas
  canvas=document.getElementById('dog-canvas');
  const area=document.getElementById('play-area');
  canvas.width=area.clientWidth*2;canvas.height=area.clientHeight*2;
  canvas.style.width=area.clientWidth+'px';canvas.style.height=area.clientHeight+'px';
  ctx=canvas.getContext('2d');

  dogX=area.clientWidth/2; dogY=area.clientHeight*0.65;
  dogFacing=1;dogAnim='idle';dogAnimT=2;
  pickTarget();

  renderStats();renderActions();renderLog();updateVisuals();updateClock();
  if(tickI)clearInterval(tickI);
  tickI=setInterval(tick,2000);
  lastT=performance.now();
  requestAnimationFrame(animLoop);
}

function tick(){
  if(!G||!G.alive)return;
  G.time++;if(G.time>=1440){G.time=0;G.day++;}
  STATS.forEach(s=>{G.stats[s.id]=clamp(G.stats[s.id]-s.decay*.15);});
  let crits=0;['hunger','happiness','bladder','clean'].forEach(k=>{if(G.stats[k]<15)crits++;});
  if(crits>=2)G.stats.health=clamp(G.stats.health-.3);
  if(G.stats.energy<5)G.stats.health=clamp(G.stats.health-.15);
  if(G.stats.bladder>=95){G.stats.bladder=30;G.stats.clean=clamp(G.stats.clean-20);G.stats.happiness=clamp(G.stats.happiness-10);addLog('had an accident! 💦');spawnParticles(['💦','💦'],2);}
  for(let k in cooldowns){if(cooldowns[k]>0)cooldowns[k]--;}
  if(G.stats.health<=0){G.alive=false;clearInterval(tickI);saveGame();document.getElementById('go-msg').textContent=`${G.name} felt neglected and ran away after ${G.day} day${G.day>1?'s':''}. Take better care next time!`;showScreen('gameover-screen');return;}
  renderStats();renderActions();updateVisuals();updateClock();
  if(G.time%30===0)saveGame();
}

function doAction(id){
  const a=ACTIONS.find(x=>x.id===id);
  if(!a||cooldowns[id]>0)return;
  for(let k in a.need){if(G.stats[k]<a.need[k]){addLog(`can't ${a.name.toLowerCase()} right now...`);return;}}
  for(let k in a.fx){G.stats[k]=clamp(G.stats[k]+a.fx[k]);}
  cooldowns[id]=a.cd;
  addLog(a.msg);

  dogAnim=a.anim;dogAnimT=a.anim==='sleep'?5:2;happyT=0;walkT=0;
  if(a.anim==='walk'||a.anim==='play')pickTarget();

  spawnParticles(a.particles, a.particles.length+2);

  saveGame();renderStats();renderActions();updateVisuals();
}

function clamp(v){return Math.max(0,Math.min(100,v));}

function renderStats(){
  const a=document.getElementById('stats-area');a.innerHTML='';
  STATS.forEach(s=>{
    const v=Math.round(G.stats[s.id]),l=v>60?'high':v>30?'mid':'low';
    a.innerHTML+=`<div class="stat"><div class="stat-label">${s.icon} ${s.label}</div><div class="stat-bar-bg"><div class="stat-bar ${l}" style="width:${v}%"></div></div></div>`;
  });
}
function renderActions(){
  const a=document.getElementById('actions-area');a.innerHTML='';
  ACTIONS.forEach(x=>{
    const cd=cooldowns[x.id]||0;
    a.innerHTML+=`<button class="action-btn" ${cd>0?'disabled':''} onclick="doAction('${x.id}')"><div class="act-icon">${x.icon}</div><div class="act-name">${x.name}</div>${cd>0?`<div class="cooldown-overlay">⏳${cd}</div>`:''}</button>`;
  });
}
function renderLog(){
  const l=document.getElementById('log');l.innerHTML='';
  (G.log||[]).slice(-6).forEach(e=>{l.innerHTML+=`<div class="log-entry"><span class="log-time">${e.t}</span>${G.name} ${e.m}</div>`;});
  l.scrollTop=l.scrollHeight;
}
function addLog(m){if(!G.log)G.log=[];G.log.push({t:fmtTime(G.time),m});if(G.log.length>30)G.log=G.log.slice(-30);renderLog();}
function updateClock(){const h=Math.floor(G.time/60)%24,m=G.time%60,ap=h<12?'AM':'PM',h12=h===0?12:h>12?h-12:h;document.getElementById('clock').textContent=`Day ${G.day} · ${h12}:${String(m).padStart(2,'0')} ${ap}`;}
function fmtTime(t){const h=Math.floor(t/60)%24,m=t%60,ap=h<12?'AM':'PM',h12=h===0?12:h>12?h-12:h;return `${h12}:${String(m).padStart(2,'0')}${ap}`;}
function updateVisuals(){
  const mood=document.getElementById('mood-float');
  const{hunger:h,happiness:hp,energy:e,bladder:bl,health:hl}=G.stats;
  if(hl<20)mood.textContent='🤒';else if(h<20)mood.textContent='🍖';else if(bl>80)mood.textContent='💧';else if(e<20)mood.textContent='😴';else if(hp>70)mood.textContent='🥰';else if(hp>40)mood.textContent='😊';else mood.textContent='😢';
  const hour=Math.floor(G.time/60)%24;
  const area=document.getElementById('play-area'),sun=document.getElementById('env-sun');
  if(hour>=20||hour<6){area.className='sky-night';sun.textContent='🌙';}else{area.className='sky-day';sun.textContent='☀️';}
}

function saveGame(){if(G)localStorage.setItem('puppypal_save',JSON.stringify(G));}
function loadGame(){const d=localStorage.getItem('puppypal_save');if(!d)return;G=JSON.parse(d);if(!G.alive){resetGame();return;}cooldowns={};enterGame();}
function resetGame(){localStorage.removeItem('puppypal_save');G=null;cooldowns={};if(tickI)clearInterval(tickI);showScreen('title-screen');document.getElementById('continue-btn').style.display='none';}

window.onload=()=>{
  initBreedGrid();
  const s=localStorage.getItem('puppypal_save');
  if(s){const p=JSON.parse(s);if(p&&p.alive)document.getElementById('continue-btn').style.display='inline-block';}
};
window.addEventListener('resize',()=>{
  if(!canvas)return;const area=document.getElementById('play-area');
  canvas.width=area.clientWidth*2;canvas.height=area.clientHeight*2;
  canvas.style.width=area.clientWidth+'px';canvas.style.height=area.clientHeight+'px';
});
</script>
</body>
